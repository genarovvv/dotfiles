# Author: z1rov

font_family JetBrainsMono NF
font_size 11
background_opacity 1.0

cursor_shape beam
cursor_beam_thickness 5.0
cursor_stop_blinking_after 0

scrollback_lines 2000
copy_on_select yes
mouse_hide_wait 0
select_by_word_characters @-./_~?&=%+#a
enable_audio_bell no
bell_on_tab "🔔 "
remember_window_size no
window_border_width 1pt
draw_minimal_borders yes
window_padding_width 14
inactive_text_alpha 0.6
hide_window_decorations yes
confirm_os_window_close 0

include color.ini

url_color #7aa2f7
url_style curly
detect_urls yes

repaint_delay 10
input_delay 3
sync_to_monitor yes

enabled_layouts splits,stack
tab_bar_edge top
tab_bar_style powerline
tab_powerline_style slanted
tab_bar_align left
tab_bar_min_tabs 2
tab_bar_margin_width 0.0
tab_bar_margin_height 0.5 1.5
inactive_tab_font_style normal
tab_activity_symbol " ● "
tab_title_template "{fmt.fg.red}{bell_symbol}{activity_symbol}{fmt.fg.tab}{title[:30]}{title[30:] and '…'} [{index}]"
active_tab_title_template "{fmt.fg.red}{bell_symbol}{activity_symbol}{fmt.fg.tab}{title[:30]}{title[30:] and '…'} [{index}]"

map ctrl+shift+z toggle_layout stack
map alt+h neighboring_window left
map alt+l neighboring_window right
map alt+k neighboring_window up
map alt+j neighboring_window down
map ctrl+shift+h launch --location=hsplit --cwd=current
map ctrl+shift+l launch --location=vsplit --cwd=current
map ctrl+alt+h resize_window narrower
map ctrl+alt+l resize_window wider
map ctrl+alt+k resize_window taller
map ctrl+alt+j resize_window shorter
map ctrl+alt+space resize_window reset
map f1 copy_to_buffer a
map f2 paste_from_buffer a
map f3 copy_to_buffer b
map f4 paste_from_buffer b
map ctrl+shift+enter new_window_with_cwd
map ctrl+shift+t new_tab_with_cwd

shell zsh
